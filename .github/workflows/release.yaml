name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: Trading212Mcp.csproj
  APP_NAME: Trading212Mcp

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
          - osx-arm64
          - linux-x64
          - linux-arm64
          - linux-musl-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish executable
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output ./publish/${{ matrix.rid }}

      - name: Package release asset
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r "../../${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.rid }}.zip" .
          else
            tar -czf "../../${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.rid }}.tar.gz" .
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: |
            ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.zip
            ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create checksums
        shell: bash
        run: |
          find ./release-assets -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" ./release-assets/*/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --generate-notes \
              ./release-assets/*/* \
              SHA256SUMS.txt
          fi

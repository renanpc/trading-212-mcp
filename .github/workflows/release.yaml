name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT_PATH: Trading212Mcp.csproj
  APP_NAME: Trading212Mcp
  WINX64_OUTPUT: ./publish/win-x64
  DOCKER_IMAGE: renanpcf/trading212-mcp

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
          - osx-arm64
          - linux-x64
          - linux-arm64
          - linux-musl-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish executable
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          --output ./publish/${{ matrix.rid }}

      - name: Package release asset
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r "../../${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.rid }}.zip" .
          else
            tar -czf "../../${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.rid }}.tar.gz" .
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: |
            ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.zip
            ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz
          if-no-files-found: ignore

  build-installer:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Download win-x64 publish artifact
        uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: ${{ env.WINX64_OUTPUT }}

      - name: Extract publish artifact
        shell: powershell
        run: |
          $zipPath = Get-ChildItem -Path "${{ env.WINX64_OUTPUT }}" -Filter "*.zip" | Select-Object -First 1
          Expand-Archive -Path $zipPath.FullName -DestinationPath "${{ env.WINX64_OUTPUT }}" -Force
          Remove-Item -Path $zipPath.FullName -Force

      - name: Install WiX
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet tool install -g wix --version 6.0.2
          wix extension add WixToolset.UI.wixext/6.0.2
          wix extension add WixToolset.Util.wixext/6.0.2

      - name: Build MSI installer
        id: build-msi
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $msiName = "${{ env.APP_NAME }}-$version-win-x64.msi"
          $sourcePath = [System.IO.Path]::GetFullPath("${{ env.WINX64_OUTPUT }}")
          $packageWxs = [System.IO.Path]::GetFullPath("installer/Package.wxs")
          Invoke-Expression "wix build -nologo -arch x64 -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext -d SourcePath='$sourcePath' -d AppName='Trading 212 MCP Server' -d Manufacturer='Trading 212 MCP' -d Version=$version -d UpgradeCode=4C0D85F4-4A78-4F19-9E13-1A2878D7C4D2 -out '$msiName' '$packageWxs'"
          Write-Output "msiName=$msiName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: ${{ steps.build-msi.outputs.msiName }}
          if-no-files-found: error

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, build-installer, publish-docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Create checksums
        shell: bash
        run: |
          find ./release-assets -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.msi" \) -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" ./release-assets/*/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --generate-notes \
              ./release-assets/*/* \
              SHA256SUMS.txt
          fi
